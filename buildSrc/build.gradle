plugins {
    id 'org.jetbrains.kotlin.jvm' version "1.9.22"
    id 'java'
}

repositories {
    mavenCentral()
    maven { url = "https://jitpack.io" }
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}
