tasks.register('downloadPosenetModel', DownloadUrlTask) {
    def downloadUrl = "https://storage.googleapis.com/download.tensorflow.org/models/tflite/posenet_mobilenet_v1_100_257x257_multi_kpt_stripped.tflite"
    def targetFile = file("src/main/ml/posenet.tflite")
    doFirst {
        if (targetFile.exists()) {
            println "File already exists: ${targetFile}"
            return
        }
        println "Downloading ${downloadUrl}"
    }
    sourceUrl = "${downloadUrl}"
    target = targetFile
}

