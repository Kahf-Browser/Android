tasks.register('downloadNsfwModel', DownloadUrlTask) {
    def downloadUrl = "https://www.dropbox.com/scl/fi/a7uemzh6gfgne5dygvxjd/nsfw.tflite?rlkey=gweab7ztkwz6g8q5xm85z215w&st=hu656c38&dl=1"
    def targetFile = file("src/main/ml/nsfw.tflite")
    doFirst {
        if (targetFile.exists()) {
            println "File already exists: ${targetFile}"
            return
        }
        println "Downloading ${downloadUrl}"
    }
    sourceUrl = "${downloadUrl}"
    target = targetFile
}

tasks.register('downloadModel') {
    dependsOn downloadNsfwModel
}

class DownloadUrlTask extends DefaultTask {
    @Input
    String sourceUrl

    @OutputFile
    File target

    @TaskAction
    void download() {
        ant.get(src: sourceUrl, dest: target)
    }
}

preBuild.dependsOn downloadModel
