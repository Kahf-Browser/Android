tasks.register('downloadModel') {
    dependsOn downloadMovenetModel
    dependsOn downloadNsfwModel
    dependsOn downloadGenderModel
}

class DownloadUrlTask extends DefaultTask {
    @Input
    String sourceUrl

    @OutputFile
    File target

    @TaskAction
    void download() {
        ant.get(src: sourceUrl, dest: target)
    }
}

preBuild.dependsOn downloadModel
